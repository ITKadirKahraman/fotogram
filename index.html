<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="img/logoForWindow.svg">
    <link rel="stylesheet" href="style.css">
    <title>Fotogram</title>
</head>
<body>
    <header class="header">
        <img src="img/Capa_1.png" alt="Fotogram mit Schriftzug">
    </header>
    <main class="main">
        <article class="photoAlbum">
            <h1>Photo album from Kadir Kahraman</h1>
            <section>
                <img src="img/auto.svg" alt="Auto">
                <img src="img/coden.svg" alt="Programmieren">
                <img src="img/doener.svg" alt="Döner Tasche">
                <img src="img/galaxie.svg" alt="Galaxie">
                <img src="img/gym.svg" alt="GYM">
                <img src="img/japan.svg" alt="Japan">
                <img src="img/macbook.svg" alt="MacBook">
            </section>
            <section class="photoUnder">
                <img src="img/pizza.svg" alt="Pizza">
                <img src="img/spaghetti.svg" alt="Spaghetti">
                <img src="img/spazieren.svg" alt="Spazieren">
                <img src="img/vogel.svg" alt="Vogel">
                <img src="img/weltraum.svg" alt="Weltraum">
            </section>
        </article>

        <article class="responsiveArticle">
            <h1>Photo album from Kadir Kahraman</h1>
            <section>
                <img src="img/auto.svg" alt="Auto">
                <img src="img/coden.svg" alt="Programmieren">
            </section>
            <section>
                <img src="img/doener.svg" alt="Döner Tasche">
                <img src="img/galaxie.svg" alt="Galaxie">
            </section>
            <section>
                <img src="img/gym.svg" alt="GYM">
                <img src="img/japan.svg" alt="Japan">
            </section>
            <section>
                <img src="img/macbook.svg" alt="MacBook">
                <img src="img/pizza.svg" alt="Pizza">
            </section>
            <section>
                <img src="img/spaghetti.svg" alt="Spaghetti">
                <img src="img/spazieren.svg" alt="Spazieren">
            </section>
            <section>
                <img src="img/vogel.svg" alt="Vogel">
                <img src="img/weltraum.svg" alt="Weltraum">
            </section>
        </article>
    </main>
    <footer>
        <div class="footer">
            <img class="footerImg" src="img/developerAkademie.png" alt="Developer Akademie Logo">
            <p>© 2026 Developer Akademie GmbH</p>
        </div>
    </footer>
</body>
</html>
