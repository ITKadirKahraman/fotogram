<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="img/logoForWindow.svg">
    <link rel="stylesheet" href="style.css">
    <title>Fotogram</title>
</head>
<body onload="initGallary()">
    <header class="header">
        <img src="img/Capa_1.png" alt="Fotogram mit Schriftzug">
    </header>
    <main>
        <section class="headlineContainer">
            <h1 class="headlineH1">Photo album from Kadir Kahraman</h1>
        </section>
        <article>
            <section class="photoGallary" id="photoGallary"></section>
            <button class="img-btn" onclick="openDialog()" aria-label="Dialog öffnen">
                <dialog id="fullPhoto" class="dialogPhoto" aria-labelledby="ariaDialogPhoto">
                    <header>
                        <h2 class="dialogHeadline" id="dialogHeadline gridLayout">placeholder</h3>
                        <button class="close-btn" id="closeDialog" aria-label="schließen"></button>
                    </header>
                    <figure>
                        <img class="figureImg" src="/shared-assets/images/examples/elephant.jpg" alt="Elephant at sunset" id="dialogPhoto"/>
                        <figcaption class="figCap">An elephant at sunset</figcaption>
                    </figure>
                    <nav>
                        <button class="arrowLeft" id="arrowLeft" aria-label="Pfeil nach links"></button>
                            <p class="pageNumber" id="dialogPageNumber">placeholder</p>
                        <button class="arrowRight" id="arrowRight" aria-left="Pfeil nach rechts"></button>
                    </nav>
                </dialog>
            </button>
        </article>
    </main>
    <footer>
        <div class="footer">
            <img class="footerImg" src="img/developerAkademie.png" alt="Developer Akademie Logo" aria-label="Developer Akademie Logo">
            <p>© 2026 Developer Akademie GmbH</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
